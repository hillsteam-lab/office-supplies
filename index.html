<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Office Supplies" />
<meta name="theme-color" content="#f7f6f2" />
<title>Office Supplies</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.09);
    --border-mid: rgba(0,0,0,0.15);
    --text: #1a1917;
    --muted: #6b6960;
    --hint: #a09d96;
    --green: #3b6d11;
    --green-bg: #eaf3de;
    --green-border: #c0dd97;
    --amber: #854f0b;
    --amber-bg: #faeeda;
    --amber-bar: #ef9f27;
    --amber-border: #fac775;
    --red: #501313;
    --red-bg: #fcebeb;
    --red-border: #f7c1c1;
    --blue-accent: #378add;
    --radius: 14px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --border: rgba(255,255,255,0.08);
      --border-mid: rgba(255,255,255,0.14);
      --text: #f0ede8;
      --muted: #9a9790;
      --hint: #5c5a56;
      --green: #c0dd97;
      --green-bg: #173404;
      --green-border: #3b6d11;
      --amber: #fac775;
      --amber-bg: #412402;
      --amber-bar: #ef9f27;
      --amber-border: #854f0b;
      --red: #f7c1c1;
      --red-bg: #501313;
      --red-border: #a32d2d;
      --blue-accent: #85b7eb;
    }
  }

  html, body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: calc(5.5rem + var(--safe-bottom));
  }

  /* Topbar */
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: calc(var(--safe-top) + 1rem) 1.25rem 0.75rem;
    border-bottom: 0.5px solid var(--border);
  }
  .topbar-row { display: flex; align-items: center; justify-content: space-between; }
  .app-title { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .topbar-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 8px 1.25rem;
  }
  .tab {
    flex: 1; text-align: center; font-size: 13px; font-weight: 500;
    padding: 6px 0; border-radius: var(--radius-sm);
    cursor: pointer; color: var(--muted);
    border: none; background: none; transition: all 0.15s;
  }
  .tab.active {
    background: var(--bg); color: var(--text);
    border: 0.5px solid var(--border-mid);
  }

  /* Nudge banner */
  .nudge {
    margin: 0.75rem 1.25rem 0;
    background: var(--amber-bg); border: 0.5px solid var(--amber-border);
    border-radius: var(--radius-sm); padding: 9px 12px;
    font-size: 13px; color: var(--amber);
    display: flex; align-items: center; gap: 8px;
  }
  .nudge.hidden { display: none; }
  .nudge-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber-bar); flex-shrink: 0; }

  /* Category sections */
  .content { padding: 0 1.25rem; }
  .cat-section { margin-top: 1.1rem; }
  .cat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .cat-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); white-space: nowrap; }
  .cat-line { flex: 1; height: 0.5px; background: var(--border); }

  /* Item rows */
  .item-row {
    padding: 7px 0 5px;
    border-bottom: 0.5px solid var(--border);
  }
  .item-row:last-child { border-bottom: none; }
  .item-top { display: flex; align-items: center; gap: 8px; }
  .item-name { flex: 1; font-size: 14px; color: var(--text); line-height: 1.3; }

  .status-toggle { display: flex; gap: 3px; flex-shrink: 0; }
  .s-btn {
    font-size: 11px; font-weight: 500; padding: 3px 7px;
    border-radius: 99px; border: 0.5px solid transparent;
    cursor: pointer; transition: all 0.12s; white-space: nowrap;
    background: var(--bg); color: var(--muted); border-color: var(--border-mid);
  }
  .s-btn.sel.s-ok  { background: var(--green-bg);  color: var(--green);  border-color: var(--green-border); }
  .s-btn.sel.s-low { background: var(--amber-bg);  color: var(--amber);  border-color: var(--amber-border); }
  .s-btn.sel.s-out { background: var(--red-bg);    color: var(--red);    border-color: var(--red-border); }

  .rm-btn {
    font-size: 16px; color: var(--hint); background: none;
    border: none; cursor: pointer; padding: 0 2px; line-height: 1;
    opacity: 0.5; flex-shrink: 0;
  }
  .rm-btn:active { opacity: 1; }

  /* Note field — tight */
  .note-wrap { padding: 2px 0 0; }
  .note-input {
    width: 100%; font-size: 12px; font-family: 'DM Sans', sans-serif;
    color: var(--muted); background: none; border: none;
    border-bottom: 0.5px solid transparent;
    padding: 0; outline: none; resize: none;
    line-height: 1.4; transition: border-color 0.15s;
    overflow: hidden; display: block;
    min-height: 18px; height: 18px;
  }
  .note-input::placeholder { color: var(--hint); }
  .note-input:focus {
    border-bottom-color: var(--blue-accent);
    color: var(--text);
  }

  /* Add row */
  .add-row {
    display: flex; gap: 8px; margin-top: 1.1rem;
    padding-bottom: 1rem; flex-wrap: wrap;
  }
  .add-row input[type=text] {
    flex: 1; min-width: 110px; font-size: 14px;
    padding: 0 10px; height: 36px;
    border: 0.5px solid var(--border-mid); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text); outline: none;
    font-family: 'DM Sans', sans-serif;
  }
  .add-row input[type=text]:focus { border-color: var(--blue-accent); }
  .add-row select {
    font-size: 12px; padding: 0 8px; height: 36px;
    border: 0.5px solid var(--border-mid); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text); outline: none;
    font-family: 'DM Sans', sans-serif;
  }
  .add-row button {
    height: 36px; padding: 0 16px;
    background: var(--text); color: var(--bg);
    border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .add-row button:active { opacity: 0.8; }

  /* Views */
  .home-view.hidden { display: none; }
  .list-view { display: none; }
  .list-view.active { display: block; }

  /* Order list */
  .list-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 0.9rem 1.25rem 0.75rem; gap: 8px;
  }
  .list-title { font-size: 15px; font-weight: 600; }
  .list-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .reset-btn {
    font-size: 12px; color: var(--muted); background: none;
    border: 0.5px solid var(--border-mid); padding: 5px 10px;
    border-radius: var(--radius-sm); cursor: pointer; white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .reset-btn:active { background: var(--border); }

  .list-content { padding: 0 1.25rem; }
  .list-cat-section { margin-bottom: 1.1rem; }
  .list-cat-name {
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--muted);
    margin-bottom: 4px; padding-bottom: 5px;
    border-bottom: 0.5px solid var(--border);
  }

  .list-item { padding: 7px 0 5px; border-bottom: 0.5px solid var(--border); }
  .list-item:last-child { border-bottom: none; }
  .list-item-top { display: flex; align-items: center; gap: 10px; }
  .checkbox {
    width: 18px; height: 18px; border-radius: 5px;
    border: 1.5px solid var(--border-mid);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .checkbox.checked { background: #639922; border-color: #639922; }
  .checkbox.checked::after {
    content: ''; display: block; width: 5px; height: 9px;
    border: 2px solid white; border-top: none; border-left: none;
    transform: rotate(40deg) translate(-1px,-1px);
  }
  .list-item-name { font-size: 14px; flex: 1; }
  .list-item-name.checked { text-decoration: line-through; color: var(--muted); }
  .urgency { font-size: 11px; padding: 2px 7px; border-radius: 99px; font-weight: 500; flex-shrink: 0; }
  .urg-out { background: var(--red-bg); color: var(--red); }
  .urg-low { background: var(--amber-bg); color: var(--amber); }
  .list-item-note { font-size: 12px; color: var(--muted); margin-top: 2px; padding-left: 28px; font-style: italic; }

  .empty-list { text-align: center; padding: 3rem 1.25rem; color: var(--muted); font-size: 14px; }

  /* FAB */
  .fab-area {
    position: fixed;
    bottom: calc(1rem + var(--safe-bottom));
    left: 50%; transform: translateX(-50%);
    width: calc(100% - 2.5rem); max-width: 430px;
    display: flex; gap: 8px;
  }
  .fab {
    flex: 1; height: 48px; border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; border: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  .fab-remind { background: var(--surface); color: var(--text); border: 0.5px solid var(--border-mid); }
  .fab-add    { background: var(--text); color: var(--bg); }
  .fab:active { opacity: 0.8; }

  /* Reminder sheet */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 50; animation: fadeIn 0.2s ease;
  }
  .overlay.hidden { display: none; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .sheet {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 1.25rem 1.25rem calc(1.5rem + var(--safe-bottom));
    width: 100%; max-width: 480px;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp { from { transform:translateY(16px); opacity:0; } to { transform:translateY(0); opacity:1; } }
  .sheet-handle { width: 36px; height: 4px; background: var(--border-mid); border-radius: 99px; margin: 0 auto 1.1rem; }
  .sheet-title { font-size: 16px; font-weight: 600; margin-bottom: 0.9rem; }
  .reminder-store { margin-bottom: 0.9rem; }
  .reminder-store-name { font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 4px; }
  .reminder-items { font-size: 14px; color: var(--text); line-height: 1.6; }
  .reminder-note  { font-size: 12px; color: var(--muted); font-style: italic; }
  .sheet-close {
    width: 100%; height: 44px; background: var(--text); color: var(--bg);
    border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
    cursor: pointer; margin-top: 1.1rem; font-family: 'DM Sans', sans-serif;
  }
  .all-good { text-align: center; padding: 1rem 0; font-size: 14px; color: var(--muted); }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="app-title">Office supplies</div>
        <div class="topbar-sub" id="subLine">Loading…</div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabHome" onclick="switchTab('home')">Stock levels</button>
    <button class="tab" id="tabList" onclick="switchTab('list')">Order list</button>
  </div>

  <!-- Home view -->
  <div class="home-view" id="homeView">
    <div id="nudge" class="nudge hidden">
      <div class="nudge-dot"></div>
      <span id="nudgeText"></span>
    </div>
    <div class="content">
      <div id="catContainer"></div>
      <div class="add-row">
        <input id="newName" type="text" placeholder="Add item…" onkeydown="if(event.key==='Enter')addItem()" />
        <select id="newCat">
          <option value="Paper & printing">Paper & printing</option>
          <option value="Writing">Writing</option>
          <option value="Desk">Desk</option>
          <option value="Tech">Tech</option>
          <option value="Kitchen">Kitchen</option>
          <option value="Cleaning">Cleaning</option>
          <option value="Other">Other</option>
        </select>
        <button onclick="addItem()">Add</button>
      </div>
    </div>
  </div>

  <!-- List view -->
  <div class="list-view" id="listView">
    <div class="list-header">
      <div>
        <div class="list-title">Order list</div>
        <div class="list-sub" id="listSub"></div>
      </div>
      <button class="reset-btn" onclick="resetChecked()">Clear ticked</button>
    </div>
    <div class="list-content" id="listContainer"></div>
  </div>

</div>

<!-- FABs -->
<div class="fab-area">
  <button class="fab fab-remind" onclick="openReminder()">🔔 Leaving work?</button>
  <button class="fab fab-add"    onclick="focusAdd()">+ Add item</button>
</div>

<!-- Reminder overlay -->
<div class="overlay hidden" id="overlay" onclick="handleOvClick(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">On your way home</div>
    <div id="reminderBody"></div>
    <button class="sheet-close" onclick="closeReminder()">Got it</button>
  </div>
</div>

<script>
const CATS = ['Paper & printing','Writing','Desk','Tech','Kitchen','Cleaning','Other'];
const STORE_KEY = 'office_supplies_notes_v1';

let items = [
  {id:1,  name:'Printer paper',       cat:'Paper & printing', status:'low', note:'A4 80gsm, buy 2 reams',  checked:false},
  {id:2,  name:'Ink cartridges',      cat:'Paper & printing', status:'ok',  note:'HP 305 black + colour',  checked:false},
  {id:3,  name:'Blue pens',           cat:'Writing',          status:'low', note:'Bic ballpoint x20 pack', checked:false},
  {id:4,  name:'Whiteboard markers',  cat:'Writing',          status:'ok',  note:'Black + red + blue',     checked:false},
  {id:5,  name:'Sticky notes',        cat:'Desk',             status:'out', note:'76x76mm yellow',         checked:false},
  {id:6,  name:'Staples',             cat:'Desk',             status:'ok',  note:'',                       checked:false},
  {id:7,  name:'Binder clips',        cat:'Desk',             status:'out', note:'Assorted sizes',         checked:false},
  {id:8,  name:'Scissors',            cat:'Desk',             status:'ok',  note:'',                       checked:false},
  {id:9,  name:'USB-A hub',           cat:'Tech',             status:'low', note:'4-port at least',        checked:false},
  {id:10, name:'AA batteries',        cat:'Tech',             status:'ok',  note:'Duracell preferred',     checked:false},
  {id:11, name:'Coffee pods',         cat:'Kitchen',          status:'low', note:'Nespresso original x50', checked:false},
  {id:12, name:'Milk',                cat:'Kitchen',          status:'out', note:'Full cream 2L',          checked:false},
  {id:13, name:'Hand soap',           cat:'Cleaning',         status:'ok',  note:'',                       checked:false},
  {id:14, name:'Hand sanitiser',      cat:'Cleaning',         status:'low', note:'500ml pump bottle',      checked:false},
];
let nextId = 20;
let currentTab = 'home';

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) { const p = JSON.parse(raw); items = p.items || items; nextId = p.nextId || nextId; }
  } catch {}
}
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify({items, nextId})); } catch {}
}

function setStatus(id, s) {
  const item = items.find(i=>i.id===id);
  if (item) { item.status = s; save(); render(); }
}
function updateNote(id, val) {
  const item = items.find(i=>i.id===id);
  if (item) { item.note = val; save(); }
}
function removeItem(id) {
  items = items.filter(i=>i.id!==id); save(); render();
}
function addItem() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return;
  const cat = document.getElementById('newCat').value;
  items.push({id:nextId++, name, cat, status:'ok', note:'', checked:false});
  document.getElementById('newName').value = '';
  save(); render();
}
function focusAdd() {
  if (currentTab !== 'home') switchTab('home');
  setTimeout(()=>document.getElementById('newName').focus(), 80);
}
function toggleCheck(id) {
  const item = items.find(i=>i.id===id);
  if (item) { item.checked = !item.checked; save(); renderList(); }
}
function resetChecked() {
  items.forEach(i=>i.checked=false); save(); renderList();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabHome').classList.toggle('active', tab==='home');
  document.getElementById('tabList').classList.toggle('active', tab==='list');
  document.getElementById('homeView').classList.toggle('hidden', tab!=='home');
  document.getElementById('listView').classList.toggle('active', tab==='list');
  if (tab==='list') renderList(); else renderHome();
}

function renderHome() {
  const low = items.filter(i=>i.status==='low'||i.status==='out');
  const nudge = document.getElementById('nudge');
  if (low.length > 0) {
    document.getElementById('nudgeText').textContent = `${low.length} item${low.length>1?'s':''} running low or out — check the order list`;
    nudge.classList.remove('hidden');
  } else { nudge.classList.add('hidden'); }

  const byCat = {};
  CATS.forEach(c=>byCat[c]=[]);
  items.forEach(i=>{ if(byCat[i.cat]) byCat[i.cat].push(i); });

  document.getElementById('catContainer').innerHTML = CATS.filter(c=>byCat[c].length>0).map(cat=>`
    <div class="cat-section">
      <div class="cat-header">
        <span class="cat-label">${cat}</span>
        <div class="cat-line"></div>
      </div>
      ${byCat[cat].map(item=>`
        <div class="item-row">
          <div class="item-top">
            <div class="item-name">${esc(item.name)}</div>
            <div class="status-toggle">
              <button class="s-btn s-ok${item.status==='ok'?' sel':''}"  onclick="setStatus(${item.id},'ok')">Good</button>
              <button class="s-btn s-low${item.status==='low'?' sel':''}" onclick="setStatus(${item.id},'low')">Low</button>
              <button class="s-btn s-out${item.status==='out'?' sel':''}" onclick="setStatus(${item.id},'out')">Out</button>
            </div>
            <button class="rm-btn" onclick="removeItem(${item.id})" title="Remove">×</button>
          </div>
          <div class="note-wrap">
            <textarea class="note-input" rows="1"
              placeholder="Note: brand, size, where to buy…"
              oninput="updateNote(${item.id},this.value);autoResize(this)"
              onfocus="autoResize(this)"
            >${esc(item.note)}</textarea>
          </div>
        </div>`).join('')}
    </div>`).join('');

  const subLine = items.length + ' items · ' + (low.length > 0 ? low.length + ' need attention' : 'all stocked');
  document.getElementById('subLine').textContent = subLine;
}

function renderList() {
  const need = items.filter(i=>i.status==='low'||i.status==='out');
  const container = document.getElementById('listContainer');
  if (need.length === 0) {
    container.innerHTML = '<div class="empty-list">Nothing to order — all stocked up 🎉</div>';
    document.getElementById('listSub').textContent = '';
    return;
  }
  const ticked = need.filter(i=>i.checked).length;
  document.getElementById('listSub').textContent = `${need.length - ticked} to order · ${ticked} done`;

  const sorted = [...need].sort((a,b)=>{
    if (a.checked !== b.checked) return a.checked ? 1 : -1;
    if (a.status !== b.status) return a.status==='out' ? -1 : 1;
    return a.cat.localeCompare(b.cat);
  });

  const byCat = {};
  sorted.forEach(i=>{ (byCat[i.cat]=byCat[i.cat]||[]).push(i); });

  container.innerHTML = Object.entries(byCat).map(([cat,citems])=>`
    <div class="list-cat-section">
      <div class="list-cat-name">${cat}</div>
      ${citems.map(item=>`
        <div class="list-item">
          <div class="list-item-top">
            <div class="checkbox${item.checked?' checked':''}" onclick="toggleCheck(${item.id})"></div>
            <span class="list-item-name${item.checked?' checked':''}"> ${esc(item.name)}</span>
            <span class="urgency ${item.status==='out'?'urg-out':'urg-low'}">${item.status==='out'?'Out':'Low'}</span>
          </div>
          ${item.note ? `<div class="list-item-note">${esc(item.note)}</div>` : ''}
        </div>`).join('')}
    </div>`).join('');

  const low = items.filter(i=>i.status==='low'||i.status==='out');
  const subLine = items.length + ' items · ' + (low.length > 0 ? low.length + ' need attention' : 'all stocked');
  document.getElementById('subLine').textContent = subLine;
}

function render() {
  if (currentTab === 'home') renderHome(); else renderList();
}

function openReminder() {
  const need = items.filter(i=>i.status==='low'||i.status==='out');
  const body = document.getElementById('reminderBody');
  if (need.length === 0) {
    body.innerHTML = '<div class="all-good">Everything is stocked up — enjoy the commute! 🎉</div>';
  } else {
    const byStore = {'Officeworks':[], 'Coles':[], 'Other':[]};
    need.forEach(i => {
      const note = i.note.toLowerCase();
      if (note.includes('coles')||note.includes('woolworths')||note.includes('aldi')||i.cat==='Kitchen') byStore['Coles'].push(i);
      else byStore['Officeworks'].push(i);
    });
    let html = '';
    Object.entries(byStore).forEach(([store, sitems]) => {
      if (sitems.length === 0) return;
      html += `<div class="reminder-store">
        <div class="reminder-store-name">${store}</div>
        ${sitems.map(i=>`
          <div style="padding:4px 0; border-bottom:0.5px solid var(--border);">
            <div class="reminder-items">${esc(i.name)} <span style="font-size:11px;padding:1px 6px;border-radius:99px;margin-left:4px;${i.status==='out'?'background:var(--red-bg);color:var(--red)':'background:var(--amber-bg);color:var(--amber)'}">${i.status==='out'?'Out':'Low'}</span></div>
            ${i.note?`<div class="reminder-note">${esc(i.note)}</div>`:''}
          </div>`).join('')}
      </div>`;
    });
    body.innerHTML = html;
  }
  document.getElementById('overlay').classList.remove('hidden');
}
function closeReminder() { document.getElementById('overlay').classList.add('hidden'); }
function handleOvClick(e) { if (e.target===document.getElementById('overlay')) closeReminder(); }

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
render();

// resize all textareas after render
setTimeout(()=>{
  document.querySelectorAll('.note-input').forEach(el => {
    if (el.value) autoResize(el);
  });
}, 50);
</script>
</body>
</html>
